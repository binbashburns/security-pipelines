name: security

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "**/*.md"
      - ".github/workflows/security.yml"
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # Stage 1 — gate: fail-fast on credentials.
  secrets:
    uses: binbashburns/security-pipelines/.github/workflows/secrets.yml@main

  # Stage 2 — static analysis + link audit, parallel after secrets passes.
  sast:
    needs: secrets
    if: github.event_name == 'pull_request'
    uses: binbashburns/security-pipelines/.github/workflows/sast.yml@main
    with:
      language: javascript

  link-check:
    needs: secrets
    uses: binbashburns/security-pipelines/.github/workflows/link-check.yml@main
    with:
      paths: "**/*.html **/*.md"
      create-issue: true

  # Stage 3 — dynamic scan. Gated on secrets; sast is PR-only so isn't a hard prerequisite.
  dast:
    needs: secrets
    uses: binbashburns/security-pipelines/.github/workflows/dast.yml@main
