name: SBOM + vuln (Syft + Grype)

on:
  workflow_call:
    inputs:
      path:
        description: "Directory to scan"
        required: false
        default: "."
        type: string
      severity-cutoff:
        description: "Grype severity cutoff (critical | high | medium | low | negligible)"
        required: false
        default: "medium"
        type: string
      fail-build:
        description: "Fail on findings at or above the cutoff"
        required: false
        default: false
        type: boolean
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  syft-grype:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: ${{ inputs.path }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json

      - name: Vulnerability scan (Grype)
        id: grype
        uses: anchore/scan-action@v6
        with:
          path: ${{ inputs.path }}
          fail-build: ${{ inputs.fail-build }}
          severity-cutoff: ${{ inputs.severity-cutoff }}
          output-format: sarif

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: grype-sarif
          path: ${{ steps.grype.outputs.sarif }}

      - name: Comment summary on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let counts = { high: 0, medium: 0, low: 0 };
            try {
              const sarif = JSON.parse(fs.readFileSync('${{ steps.grype.outputs.sarif }}', 'utf8'));
              for (const run of (sarif.runs || [])) {
                for (const r of (run.results || [])) {
                  const sev = (r.level || 'note').toLowerCase();
                  if (sev === 'error') counts.high++;
                  else if (sev === 'warning') counts.medium++;
                  else counts.low++;
                }
              }
            } catch (e) {}
            const body =
              `## SBOM + Grype\n\n` +
              `${counts.high} high+ · ${counts.medium} medium · ${counts.low} low\n\n` +
              `[Artifacts](${context.payload.repository.html_url}/actions/runs/${context.runId}#artifacts)`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
