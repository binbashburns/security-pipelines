name: DAST (ZAP baseline)

on:
  workflow_call:
    inputs:
      target-url:
        description: "URL ZAP scans (use http://host.docker.internal:PORT for local servers)"
        required: false
        default: "http://host.docker.internal:8000"
        type: string
      serve-port:
        description: "Port to serve a static site on. Set 0 to skip the local server and scan target-url directly."
        required: false
        default: 8000
        type: number
      serve-path:
        description: "Directory to serve when serve-port > 0"
        required: false
        default: "."
        type: string
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  zap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Serve static site
        if: inputs.serve-port > 0
        run: |
          cd "${{ inputs.serve-path }}"
          nohup python3 -m http.server "${{ inputs.serve-port }}" > "$RUNNER_TEMP/server.log" 2>&1 &
          for i in {1..20}; do
            if curl -fsS "http://localhost:${{ inputs.serve-port }}/" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat "$RUNNER_TEMP/server.log"
          exit 1

      - name: ZAP baseline scan
        run: |
          mkdir -p zap-reports && chmod 777 zap-reports
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -v "$(pwd)/zap-reports:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "${{ inputs.target-url }}" \
              -r baseline-report.html \
              -J baseline-report.json \
              -d -I || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: zap-reports
          path: zap-reports/

      - name: Comment summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let counts = { High: 0, Medium: 0, Low: 0, Informational: 0 };
            try {
              const r = JSON.parse(fs.readFileSync('zap-reports/baseline-report.json', 'utf8'));
              for (const a of (r.site?.[0]?.alerts || [])) {
                const sev = ({ '3':'High','2':'Medium','1':'Low','0':'Informational' })[a.riskcode] || 'Unknown';
                const n = a.instances?.length || 0;
                if (counts.hasOwnProperty(sev)) counts[sev] += n;
              }
            } catch (e) {
              counts = null;
            }
            const body = counts
              ? `## ZAP DAST\n\n${counts.High} high · ${counts.Medium} med · ${counts.Low} low · ${counts.Informational} info\n\n[Reports](${context.payload.repository.html_url}/actions/runs/${context.runId}#artifacts)`
              : `## ZAP DAST\n\nScan failed; see workflow logs.`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
