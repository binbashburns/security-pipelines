name: SAST (Semgrep)

on:
  workflow_call:
    inputs:
      language:
        description: "'auto' or comma-separated lang packs (javascript, csharp, ruby, python, go, java, php, typescript)"
        required: false
        default: "auto"
        type: string
      severity-fail:
        description: "Fail on findings at this severity or above (ERROR | WARNING | INFO | none)"
        required: false
        default: "none"
        type: string
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v6

      - name: Build config flags
        id: cfg
        shell: bash
        run: |
          if [[ "${{ inputs.language }}" == "auto" ]]; then
            echo "flags=--config=auto" >> "$GITHUB_OUTPUT"
          else
            flags="--config=p/ci"
            IFS=',' read -ra packs <<< "${{ inputs.language }}"
            for p in "${packs[@]}"; do
              flags="$flags --config=p/$(echo "$p" | xargs)"
            done
            echo "flags=$flags" >> "$GITHUB_OUTPUT"
          fi

      - name: Seed empty report
        # Ensures downstream steps always read valid JSON, even if semgrep crashes before writing.
        shell: bash
        run: echo '{"results":[],"errors":[],"paths":{"scanned":[],"skipped":[]}}' > semgrep.json

      - name: Run Semgrep
        shell: bash
        run: |
          set +e
          semgrep scan ${{ steps.cfg.outputs.flags }} \
            --json --output=semgrep.json \
            --metrics=off --disable-version-check
          rc=$?
          set -e
          # Without --error, `semgrep scan` returns 0 even when findings exist, so any non-zero is a real tool failure.
          if [[ "$rc" -ne 0 ]]; then
            echo "::error::semgrep scan exited with code $rc"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: semgrep-report
          path: semgrep.json

      - name: Comment summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              const raw = fs.readFileSync('semgrep.json', 'utf8');
              report = raw ? JSON.parse(raw) : {};
            } catch (e) {
              report = {};
            }
            const results = report.results || [];
            const counts = { ERROR: 0, WARNING: 0, INFO: 0 };
            for (const r of results) {
              const sev = (r.extra?.severity || 'INFO').toUpperCase();
              if (counts.hasOwnProperty(sev)) counts[sev]++;
            }
            const scanned = (report.paths?.scanned || []).length;
            const order = { ERROR: 0, WARNING: 1, INFO: 2 };
            const top = [...results]
              .sort((a, b) => (order[(a.extra?.severity || 'INFO').toUpperCase()] ?? 3)
                            - (order[(b.extra?.severity || 'INFO').toUpperCase()] ?? 3))
              .slice(0, 5);

            let table = '';
            if (top.length > 0) {
              table = '\n\n| Severity | Rule | Location |\n| --- | --- | --- |\n';
              for (const f of top) {
                const sev = (f.extra?.severity || 'INFO').toUpperCase();
                const rule = (f.check_id || '').split('.').pop();
                const loc = `${f.path}:${f.start?.line ?? '?'}`;
                table += `| ${sev} | \`${rule}\` | \`${loc}\` |\n`;
              }
              if (results.length > 5) {
                table += `\n_Showing top 5 of ${results.length}. Full list in the artifact._`;
              }
            }

            const summaryLine = scanned > 0
              ? `Scanned **${scanned}** file${scanned === 1 ? '' : 's'}.`
              : `_No files scanned — check that the \`language\` input matches files in the repo._`;

            const body =
              `## Semgrep SAST\n\n` +
              `${summaryLine}\n\n` +
              `**${counts.ERROR}** error · **${counts.WARNING}** warning · **${counts.INFO}** info` +
              table +
              `\n\n[Report artifact](${context.payload.repository.html_url}/actions/runs/${context.runId}#artifacts)`;

            const existing = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const prior = existing.data.find(c =>
              (c.user?.type === 'Bot' || c.user?.login === 'github-actions[bot]')
              && c.body?.startsWith('## Semgrep SAST')
            );
            if (prior) {
              await github.rest.issues.updateComment({
                comment_id: prior.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Enforce severity gate
        if: inputs.severity-fail != 'none'
        shell: bash
        run: |
          gate="${{ inputs.severity-fail }}"
          findings=$(jq -r --arg g "$gate" '
            ($g | ascii_upcase) as $G |
            [.results[]? | select((.extra.severity // "INFO") | ascii_upcase as $s |
              ($G == "INFO") or ($G == "WARNING" and ($s == "WARNING" or $s == "ERROR")) or ($G == "ERROR" and $s == "ERROR")
            )] | length' semgrep.json)
          [[ "$findings" -eq 0 ]] || { echo "Findings at $gate or above: $findings"; exit 1; }
