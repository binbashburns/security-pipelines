name: Secrets scan (TruffleHog)

on:
  workflow_call:
    inputs:
      extra-args:
        description: "Extra CLI args for trufflehog (the action adds --fail on its own; don't repeat it here)"
        required: false
        default: "--only-verified"
        type: string
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve scan range
        id: range
        env:
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          base="${PR_BASE:-$PUSH_BEFORE}"
          head="${PR_HEAD:-$PUSH_SHA}"
          # Treat zero-SHA (new branch / initial push) as no base so the full history is scanned.
          if [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base=""
          fi
          # If base and head match (e.g. workflow_dispatch, single-commit push), drop base so the action falls back to a full scan.
          if [ -n "$base" ] && [ "$base" = "$head" ]; then
            base=""
          fi
          echo "base=$base" >>"$GITHUB_OUTPUT"
          echo "head=$head" >>"$GITHUB_OUTPUT"

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ steps.range.outputs.base }}
          head: ${{ steps.range.outputs.head }}
          extra_args: ${{ inputs.extra-args }}
