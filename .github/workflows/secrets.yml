name: Secrets scan (gitleaks)

on:
  workflow_call:
    inputs:
      fail-on-finding:
        description: "Fail the job on any finding"
        required: false
        default: true
        type: boolean
      config-path:
        description: "Optional path to a custom .gitleaks.toml in the calling repo"
        required: false
        default: ""
        type: string
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
          GITLEAKS_CONFIG: ${{ inputs.config-path }}
        continue-on-error: ${{ inputs.fail-on-finding == false }}
