name: Secrets scan (TruffleHog)

on:
  workflow_call:
    inputs:
      extra-args:
        description: "Extra CLI args for trufflehog (e.g. '--only-verified', '--results=verified,unknown')"
        required: false
        default: "--only-verified --fail"
        type: string
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: ${{ inputs.extra-args }}
